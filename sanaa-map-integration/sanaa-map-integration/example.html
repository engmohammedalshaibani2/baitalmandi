<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة صنعاء التفاعلية - مثال التكامل</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            display: flex;
            height: 100vh;
            flex-direction: row-reverse;
        }
        
        #map {
            flex: 1;
            z-index: 1;
            background-color: #f0f0f0;
        }
        
        .sidebar {
            width: 380px;
            background: white;
            box-shadow: -2px 0 15px rgba(0,0,0,0.1);
            overflow-y: auto;
            padding: 20px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            color: white;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin: 0;
        }
        
        .language-toggle {
            display: flex;
            gap: 5px;
        }
        
        .lang-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s;
            font-size: 12px;
            font-weight: 500;
        }
        
        .lang-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .lang-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }
        
        .sidebar {
            margin-top: 70px;
        }
        
        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }
        
        .search-box::placeholder {
            color: #999;
        }
        
        .districts-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .districts-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .districts-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .districts-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        .districts-list::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        
        .district-item {
            padding: 14px;
            margin-bottom: 12px;
            background: #f9f9f9;
            border-left: 4px solid #2196F3;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
            border: 1px solid #f0f0f0;
        }
        
        .district-item:hover {
            background: #f0f0f0;
            transform: translateX(-5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-color: #e0e0e0;
        }
        
        .district-item.active {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            border-left-color: #1976D2;
            border-color: #90CAF9;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.2);
        }
        
        .district-name {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        .district-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .stat-item {
            background: white;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .district-item:hover .stat-item {
            background: #f5f5f5;
        }
        
        .stat-label {
            color: #666;
            margin-bottom: 3px;
        }
        
        .stat-value {
            font-weight: 700;
            color: #2196F3;
            font-size: 13px;
        }
        
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }
        
        .no-results-icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        
        .info-box {
            background: #E3F2FD;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 4px;
            margin-top: auto;
            font-size: 12px;
            color: #1565C0;
            line-height: 1.5;
        }
        
        .info-box strong {
            display: block;
            margin-bottom: 5px;
            color: #1565C0;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: 40%;
                margin-top: 0;
            }
            
            #map {
                height: 60%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🗺️ خريطة صنعاء التفاعلية</h1>
            <p>Sana'a Interactive Map</p>
        </div>
        <div class="language-toggle">
            <button class="lang-btn active" data-lang="ar">العربية</button>
            <button class="lang-btn" data-lang="en">English</button>
        </div>
    </div>
    
    <div class="container">
        <div id="map"></div>
        
        <div class="sidebar">
            <input 
                type="text" 
                class="search-box" 
                id="searchBox" 
                placeholder="ابحث عن منطقة..."
            >
            <div class="districts-list" id="districtsList"></div>
            <div class="info-box">
                <strong>💡 نصيحة</strong>
                انقر على أي منطقة في الخريطة أو القائمة لعرض التفاصيل
            </div>
        </div>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // إعدادات اللغة
        let currentLanguage = 'ar';
        
        // بيانات النصوص
        const translations = {
            ar: {
                search: 'ابحث عن منطقة...',
                population: 'السكان',
                area: 'المساحة',
                density: 'الكثافة',
                noResults: 'لا توجد نتائج',
                district: 'مديرية',
                neighborhood: 'حي',
                km2: 'كم²',
                tip: 'انقر على أي منطقة في الخريطة أو القائمة لعرض التفاصيل'
            },
            en: {
                search: 'Search district...',
                population: 'Population',
                area: 'Area',
                density: 'Density',
                noResults: 'No results',
                district: 'District',
                neighborhood: 'Neighborhood',
                km2: 'km²',
                tip: 'Click on any district on the map or list to view details'
            }
        };
        
        // متغيرات عامة
        let map;
        let geoJsonLayer;
        let allDistricts = [];
        let selectedDistrict = null;
        let geoJsonFeatures = {};
        
        // تهيئة الخريطة
        function initMap() {
            map = L.map('map').setView([15.35, 44.2], 12);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                maxZoom: 19,
                minZoom: 10
            }).addTo(map);
            
            loadGeoJSON();
        }
        
        // تحميل بيانات GeoJSON
        function loadGeoJSON() {
            fetch('sanaa-districts.geojson')
                .then(response => response.json())
                .then(data => {
                    allDistricts = data.features.filter(f => f.properties.admin_level === 6);
                    
                    geoJsonLayer = L.geoJSON(data, {
                        style: getFeatureStyle,
                        onEachFeature: onEachFeature
                    }).addTo(map);
                    
                    displayDistrictsList(allDistricts);
                })
                .catch(error => {
                    console.error('خطأ في تحميل البيانات:', error);
                    document.getElementById('districtsList').innerHTML = '<div class="no-results"><div class="no-results-icon">⚠️</div>خطأ في تحميل البيانات</div>';
                });
        }
        
        // الحصول على نمط الميزة
        function getFeatureStyle(feature) {
            const props = feature.properties;
            
            if (props.admin_level === 4) {
                return {
                    fillColor: '#E8EAED',
                    color: '#BDC1C6',
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.3,
                    dashArray: '5,5'
                };
            } else if (props.admin_level === 6) {
                return {
                    fillColor: '#FFFFFF',
                    color: '#9AA0A6',
                    weight: 1.5,
                    opacity: 0.8,
                    fillOpacity: 0.6
                };
            }
            
            return {};
        }
        
        // معالج كل ميزة
        function onEachFeature(feature, layer) {
            geoJsonFeatures[feature.id] = layer;
            
            const props = feature.properties;
            const name = currentLanguage === 'ar' ? props.name_ar : props.name_en;
            
            const popupContent = `
                <div style="text-align: center; min-width: 220px; font-family: Arial, sans-serif;">
                    <h3 style="margin: 0 0 10px 0; color: #1a1a1a; font-size: 16px;">${name}</h3>
                    <p style="margin: 5px 0; color: #666; font-size: 13px;">${props.category}</p>
                    <div style="margin-top: 12px; font-size: 13px; border-top: 1px solid #e0e0e0; padding-top: 10px;">
                        <p style="margin: 5px 0;"><strong style="color: #2196F3;">${translations[currentLanguage].population}:</strong> ${props.population?.toLocaleString()}</p>
                        <p style="margin: 5px 0;"><strong style="color: #2196F3;">${translations[currentLanguage].area}:</strong> ${props.area_km2} ${translations[currentLanguage].km2}</p>
                        <p style="margin: 5px 0;"><strong style="color: #2196F3;">${translations[currentLanguage].density}:</strong> ${(props.population / props.area_km2).toFixed(0)}/${translations[currentLanguage].km2}</p>
                    </div>
                </div>
            `;
            
            layer.bindPopup(popupContent);
            
            layer.on('click', () => {
                selectDistrict(feature);
                layer.openPopup();
            });
            
            layer.on('mouseover', () => {
                layer.setStyle({
                    fillColor: '#E8F0FE',
                    color: '#1F2937',
                    weight: 2,
                    fillOpacity: 0.8
                });
                layer.bringToFront();
            });
            
            layer.on('mouseout', () => {
                if (selectedDistrict?.id !== feature.id) {
                    layer.setStyle(getFeatureStyle(feature));
                }
            });
        }
        
        // عرض قائمة المديريات
        function displayDistrictsList(districts) {
            const listContainer = document.getElementById('districtsList');
            listContainer.innerHTML = '';
            
            if (districts.length === 0) {
                listContainer.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div>${translations[currentLanguage].noResults}</div>`;
                return;
            }
            
            districts.forEach(district => {
                const props = district.properties;
                const name = currentLanguage === 'ar' ? props.name_ar : props.name_en;
                const description = currentLanguage === 'ar' ? props.description_ar : props.description_en;
                const density = (props.population / props.area_km2).toFixed(0);
                
                const item = document.createElement('div');
                item.className = 'district-item' + (selectedDistrict?.id === district.id ? ' active' : '');
                item.innerHTML = `
                    <div class="district-name">${name}</div>
                    <div class="district-info">${description}</div>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-label">${translations[currentLanguage].population}</div>
                            <div class="stat-value">${(props.population / 1000).toFixed(0)}K</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">${translations[currentLanguage].area}</div>
                            <div class="stat-value">${props.area_km2}</div>
                        </div>
                    </div>
                `;
                
                item.addEventListener('click', () => selectDistrict(district));
                listContainer.appendChild(item);
            });
        }
        
        // تحديد منطقة
        function selectDistrict(district) {
            selectedDistrict = district;
            
            // تحديث القائمة
            document.querySelectorAll('.district-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const items = document.querySelectorAll('.district-item');
            const index = allDistricts.findIndex(d => d.id === district.id);
            if (items[index]) {
                items[index].classList.add('active');
                items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            // تحديث الخريطة
            if (district.properties.center) {
                const [lon, lat] = district.properties.center;
                map.setView([lat, lon], district.properties.zoom_level || 13);
            }
            
            // تحديث الطبقة الجغرافية
            if (geoJsonFeatures[district.id]) {
                geoJsonFeatures[district.id].setStyle({
                    fillColor: '#E8F0FE',
                    color: '#1F2937',
                    weight: 2,
                    fillOpacity: 0.8
                });
                geoJsonFeatures[district.id].bringToFront();
            }
        }
        
        // البحث عن المديريات
        function searchDistricts(query) {
            if (!query.trim()) {
                displayDistrictsList(allDistricts);
                return;
            }
            
            const filtered = allDistricts.filter(d => {
                const name_ar = d.properties.name_ar.toLowerCase();
                const name_en = d.properties.name_en.toLowerCase();
                const desc_ar = d.properties.description_ar.toLowerCase();
                const desc_en = d.properties.description_en.toLowerCase();
                const q = query.toLowerCase();
                
                return name_ar.includes(q) || name_en.includes(q) || desc_ar.includes(q) || desc_en.includes(q);
            });
            
            displayDistrictsList(filtered);
        }
        
        // تبديل اللغة
        function changeLanguage(lang) {
            currentLanguage = lang;
            
            // تحديث الأزرار
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // تحديث البحث
            const searchBox = document.getElementById('searchBox');
            searchBox.placeholder = translations[lang].search;
            
            // تحديث القائمة
            displayDistrictsList(allDistricts);
        }
        
        // معالجات الأحداث
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            
            document.getElementById('searchBox').addEventListener('input', (e) => {
                searchDistricts(e.target.value);
            });
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    changeLanguage(e.target.dataset.lang);
                });
            });
        });
    </script>
</body>
</html>
